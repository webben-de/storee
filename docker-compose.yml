services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-storee}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-coolify}
      POSTGRES_DB: ${POSTGRES_DB:-storee}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: storee-api:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-storee}:${POSTGRES_PASSWORD:-change-me-in-coolify}@postgres:5432/${POSTGRES_DB:-storee}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-coolify}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/api/docs >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    image: storee-web:latest
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1 >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  gateway:
    build:
      context: .
      dockerfile: docker/gateway.Dockerfile
    image: storee-gateway:latest
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - '80:80'
    networks:
      - default
      - coolify
    labels:
      - traefik.enable=true
      - traefik.http.routers.storee-gateway.rule=Host(`storee.ben-io.de`)
      - traefik.http.routers.storee-gateway.entrypoints=https
      - traefik.http.routers.storee-gateway.tls.certresolver=letsencrypt
      - traefik.http.services.storee-gateway.loadbalancer.server.port=80
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1 >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  coolify:
    external: true

volumes:
  postgres_data:
