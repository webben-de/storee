services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-storee}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-coolify}
      POSTGRES_DB: ${POSTGRES_DB:-storee}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: storee-api:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-storee}:${POSTGRES_PASSWORD:-change-me-in-coolify}@postgres:5432/${POSTGRES_DB:-storee}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-coolify}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/api/docs >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=coolify'
      - "traefik.http.routers.storee-api.rule=Host(`${APP_DOMAIN:-example.com}`) && PathPrefix(`/api`)"
      - 'traefik.http.routers.storee-api.entrypoints=websecure'
      - 'traefik.http.routers.storee-api.tls=true'
      - 'traefik.http.routers.storee-api.priority=100'
      - 'traefik.http.services.storee-api.loadbalancer.server.port=3000'
    networks:
      - internal
      - coolify

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    image: storee-web:latest
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1 >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=coolify'
      - "traefik.http.routers.storee-web.rule=Host(`${APP_DOMAIN:-example.com}`)"
      - 'traefik.http.routers.storee-web.entrypoints=websecure'
      - 'traefik.http.routers.storee-web.tls=true'
      - 'traefik.http.routers.storee-web.priority=1'
      - 'traefik.http.services.storee-web.loadbalancer.server.port=80'
    networks:
      - internal
      - coolify

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
  coolify:
    external: true
