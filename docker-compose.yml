version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-storee}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-coolify}
      POSTGRES_DB: ${POSTGRES_DB:-storee}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  api:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-storee}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-storee}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-coolify}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      NX_DAEMON: 'false'
      PNPM_HOME: /pnpm
      PNPM_STORE_PATH: /pnpm/store
    command: >-
      sh -lc "
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm prisma generate --schema=prisma/schema.prisma &&
      pnpm prisma db push --schema=prisma/schema.prisma &&
      pnpm nx run api:build:production &&
      node dist/apps/api/main.js
      "
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/api/docs >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=coolify'
      - "traefik.http.routers.storee-api.rule=Host(`${APP_DOMAIN:-example.com}`) && PathPrefix(`/api`)"
      - 'traefik.http.routers.storee-api.entrypoints=websecure'
      - 'traefik.http.routers.storee-api.tls=true'
      - 'traefik.http.routers.storee-api.priority=100'
      - 'traefik.http.services.storee-api.loadbalancer.server.port=3000'
    volumes:
      - ./:/app
      - api_node_modules:/app/node_modules
      - api_pnpm_store:/pnpm/store
    networks:
      - internal
      - coolify

  web:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NX_DAEMON: 'false'
      PNPM_HOME: /pnpm
      PNPM_STORE_PATH: /pnpm/store
    command: >-
      sh -lc "
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm nx run storee:build:production &&
      pnpm dlx http-server dist/storee/browser -a 0.0.0.0 -p 4200 -c-1
      "
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:4200 >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=coolify'
      - "traefik.http.routers.storee-web.rule=Host(`${APP_DOMAIN:-example.com}`)"
      - 'traefik.http.routers.storee-web.entrypoints=websecure'
      - 'traefik.http.routers.storee-web.tls=true'
      - 'traefik.http.routers.storee-web.priority=1'
      - 'traefik.http.services.storee-web.loadbalancer.server.port=4200'
    volumes:
      - ./:/app
      - web_node_modules:/app/node_modules
      - web_pnpm_store:/pnpm/store
    networks:
      - internal
      - coolify

volumes:
  postgres_data:
  api_node_modules:
  api_pnpm_store:
  web_node_modules:
  web_pnpm_store:

networks:
  internal:
    driver: bridge
  coolify:
    external: true
