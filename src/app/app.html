<div class="flex flex-col h-dvh bg-zinc-50 dark:bg-zinc-950">

  <!-- Sidebar (desktop) — fixed, outside flow -->
  @if (showNav) {
    <aside class="hidden lg:flex lg:flex-col fixed inset-y-0 left-0 w-60 z-10
                  border-r border-zinc-200/80 dark:border-zinc-800
                  bg-white/80 dark:bg-zinc-900/80 backdrop-blur-xl">

      <!-- Wordmark -->
      <div class="px-5 py-6">
        <div class="flex items-center gap-2.5">
          <div class="flex items-center justify-center w-8 h-8 rounded-xl bg-brand-600 shadow-sm shadow-brand-600/30">
            <app-icon name="package" [size]="16" class="text-white" aria-hidden="true" />
          </div>
          <span class="text-[17px] font-semibold tracking-tight text-zinc-900 dark:text-zinc-100">Storee</span>
        </div>
      </div>

      <!-- Nav -->
      <nav class="flex-1 px-3 pb-4 space-y-0.5" aria-label="Main navigation">
        @for (item of navItems; track item.path) {
          <a
            [routerLink]="item.path"
            routerLinkActive="bg-brand-50 dark:bg-brand-950/60 text-brand-700 dark:text-brand-300"
            [routerLinkActiveOptions]="{ exact: item.path === '/' }"
            class="group flex items-center gap-3 px-3 h-10 rounded-xl
                   text-zinc-500 dark:text-zinc-400
                   hover:bg-zinc-100 dark:hover:bg-zinc-800
                   hover:text-zinc-900 dark:hover:text-zinc-100
                   transition-all duration-[200ms] text-sm font-[500]"
            style="transition-timing-function: var(--ease-spring)"
          >
            <app-icon [name]="item.icon" [size]="17" aria-hidden="true" />
            <span>{{ item.label | transloco }}</span>
          </a>
        }
      </nav>
    </aside>
  }

  <!-- Main content -->
  <main
    class="flex-1 overflow-y-auto"
    [class.lg:pl-60]="showNav"
    id="main-content"
    tabindex="-1"
  >
    <router-outlet />
  </main>

  <!-- Bottom nav (mobile) -->
  @if (showNav) {
    <nav class="lg:hidden border-t border-zinc-200/80 dark:border-zinc-800 bg-white/90 dark:bg-zinc-900/90 backdrop-blur-xl"
         aria-label="Main navigation">
      <ul class="flex" role="list">
        @for (item of navItems; track item.path) {
          <li class="flex-1">
            <a
              [routerLink]="item.path"
              routerLinkActive="text-brand-600 dark:text-brand-400"
              [routerLinkActiveOptions]="{ exact: item.path === '/' }"
              class="flex flex-col items-center gap-1 pt-3 pb-2 px-2
                     text-zinc-400 dark:text-zinc-500
                     hover:text-zinc-700 dark:hover:text-zinc-300
                     transition-colors duration-[200ms]
                     text-[10px] font-[500] tracking-wide min-h-[56px]"
              style="transition-timing-function: var(--ease-spring)"
            >
              <app-icon [name]="item.icon" [size]="22" aria-hidden="true" />
              <span>{{ item.label | transloco }}</span>
            </a>
          </li>
        }
      </ul>
    </nav>
  }

</div>
